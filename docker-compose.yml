services:
  postgres:
    image: postgres:16-alpine
    container_name: condopay-postgres
    restart: unless-stopped
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: condopay
      POSTGRES_PASSWORD: condopay
      POSTGRES_DB: condopay
    volumes:
      - condopay_pg_data:/var/lib/postgresql/data

volumes:
  condopay_pg_data: