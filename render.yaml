# Render Blueprint — API + managed Postgres
# Deploy: Render Dashboard → New → Blueprint → connect this repo
# After deploy: set CORS_ORIGIN to your Vercel URL, then redeploy the API.

databases:
  - name: condopay-db
    databaseName: condopay
    user: condopay
    plan: free

services:
  - type: web
    name: condopay-api
    runtime: node
    plan: free
    region: oregon
    # --include=dev: Render skips TypeScript/@types in production installs; we need them to run tsc
    buildCommand: npm install --include=dev && npm run build -w @condopay/api
    # Free tier: no preDeployCommand — run migrations when the server starts instead
    startCommand: npm run db:migrate -w @condopay/api && npm run start -w @condopay/api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: condopay-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      # Set after Vercel deploy, e.g. https://condopay.vercel.app
      - key: CORS_ORIGIN
        sync: false